<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="header">
        <h2>🩺 MediBot</h2>
        <p>Your AI Medical Assistant</p>
    </div>

    <div class="chat-box" id="chat-box">

        <div class="bot-message">
            👋 Hello! I'm MediBot.<br><br>
            Ask me anything related to diseases, symptoms, medicines or healthcare.
        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="message"
            placeholder="Type your medical question..."
        >

        <button id="send-btn">
            Send
        </button>

    </div>

    <div class="footer">
        ⚠️ This chatbot is for educational purposes only and should not replace professional medical advice.
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
